<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재고 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0efed;
      --surface:  #ffffff;
      --border:   #d8d6d3;
      --subtle:   #e8e6e3;
      --muted:    #a09e9b;
      --body:     #4a4845;
      --heading:  #1a1917;
      --accent:   #2a2927;
      --danger:   #7a7875;
      --tag-food: #3a3836;
      --tag-clean:#5a5856;
      --tag-take: #6a6866;
      --tag-misc: #4e4c4a;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--body);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── HEADER ── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 22px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    header .date {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: #a09e9b;
      letter-spacing: 0.04em;
    }

    /* ── SUMMARY BAR ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .summary-item {
      padding: 14px 8px 12px;
      text-align: center;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .summary-item:last-child { border-right: none; }
    .summary-item:active { background: var(--subtle); }
    .summary-item.active { background: var(--subtle); }
    .summary-item .count {
      font-family: 'DM Mono', monospace;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--heading);
      line-height: 1;
    }
    .summary-item .label {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.03em;
    }

    /* ── MAIN ── */
    main {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── SECTION CARD ── */
    .section-card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: visible;
      transition: box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .section-card:focus-within {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--subtle);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      border-radius: 14px 14px 0 0;
    }
    .section-header:active { background: var(--subtle); }

    .section-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .food   .section-icon { background: #e8e6e3; }
    .clean  .section-icon { background: #e0dedb; }
    .take   .section-icon { background: #dbd9d6; }
    .misc   .section-icon { background: #d6d4d1; }
    .other  .section-icon { background: #d0cecc; }

    .section-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: -0.01em;
    }
    .section-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      background: var(--subtle);
      color: var(--muted);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .chevron {
      font-size: 0.8rem;
      color: var(--muted);
      transition: transform 0.25s ease;
    }
    .section-card.collapsed .chevron { transform: rotate(-90deg); }

    /* ── ITEM LIST ── */
    .item-list {
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .section-card.collapsed .item-list {
      max-height: 0 !important;
    }
    .section-card.collapsed .add-row {
      display: none;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--subtle);
      transition: background 0.15s, opacity 0.3s;
      animation: slideIn 0.2s ease;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row.done { opacity: 0.45; }
    .item-row.done .item-name { text-decoration: line-through; color: var(--muted); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .checkbox {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox.checked::after {
      content: '';
      width: 5px; height: 9px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg) translate(-1px,-1px);
      display: block;
    }

    .item-name {
      flex: 1;
      font-size: 0.9rem;
      color: var(--body);
      line-height: 1.3;
    }

    .del-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .del-btn:active { background: #ebe9e6; color: #555; }

    /* ── ADD ROW ── */
    .add-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--subtle);
      background: var(--surface);
      border-radius: 0 0 14px 14px;
    }
    .add-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.88rem;
      color: var(--body);
      background: var(--subtle);
      border-radius: 8px;
      padding: 9px 12px;
    }
    .add-input::placeholder { color: var(--muted); }

    .add-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .add-btn:active { background: #444; }

    /* ── EMPTY STATE ── */
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ── DONE CLEAR ALL ── */
    .clear-done {
      display: none;
      margin: 0 16px;
      padding: 11px 0;
      width: calc(100% - 32px);
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }
    .clear-done.visible { display: block; }
    .clear-done:active { background: var(--subtle); color: var(--body); }
  </style>
</head>
<body>

<header>
  <h1>📋 재고 관리</h1>
  <span class="date" id="today-date"></span>
</header>

<div class="summary">
  <div class="summary-item" onclick="scrollToSection('food')">
    <div class="count" id="cnt-food">0</div>
    <div class="label">식품</div>
  </div>
  <div class="summary-item" onclick="scrollToSection('clean')">
    <div class="count" id="cnt-clean">0</div>
    <div class="label">청소</div>
  </div>
  <div class="summary-item" onclick="scrollToSection('take')">
    <div class="count" id="cnt-take">0</div>
    <div class="label">테이크아웃</div>
  </div>
  <div class="summary-item" onclick="scrollToSection('misc')">
    <div class="count" id="cnt-misc">0</div>
    <div class="label">소모품</div>
  </div>
  <div class="summary-item" onclick="scrollToSection('other')">
    <div class="count" id="cnt-other">0</div>
    <div class="label">기타</div>
  </div>
</div>

<main id="main-content">
  <!-- sections injected by JS -->
</main>

<div id="sync-status" style="
  position:fixed; bottom:16px; right:16px;
  background: var(--accent); color:#fff;
  font-size:0.72rem; padding:6px 12px;
  border-radius:20px; opacity:0;
  transition: opacity 0.3s;
  font-family:'DM Mono',monospace;
  z-index:200; pointer-events:none;
" id="sync-toast"></div>

<button class="clear-done" id="clear-done-btn" onclick="clearDone()">✓ 완료된 항목 모두 삭제</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot,
  addDoc, deleteDoc, updateDoc, doc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase 설정 ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyArW3yhj81OJpOkCEYfyaelgcdo8o_IAPw",
  authDomain: "banchan-inventory-144bd.firebaseapp.com",
  projectId: "banchan-inventory-144bd",
  storageBucket: "banchan-inventory-144bd.firebasestorage.app",
  messagingSenderId: "1022526862273",
  appId: "1:1022526862273:web:12a025d9db24c7c6b83540"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const SECTIONS = [
  { id: 'food',  label: '식품',       icon: '🥩' },
  { id: 'clean', label: '청소',       icon: '🧹' },
  { id: 'take',  label: '테이크아웃',  icon: '🛍' },
  { id: 'misc',  label: '소모품',     icon: '🪣' },
  { id: 'other', label: '기타',       icon: '📦' },
];

// 섹션별 로컬 캐시
const cache = {};
SECTIONS.forEach(s => cache[s.id] = []);

// ── 토스트 ─────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('sync-toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 1800);
}

// ── 렌더 ───────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildItemRow(secId, item) {
  const row = document.createElement('div');
  row.className = 'item-row' + (item.done ? ' done' : '');
  row.id = `row-${item.id}`;
  row.innerHTML = `
    <div class="checkbox ${item.done ? 'checked' : ''}" id="cb-${item.id}"></div>
    <span class="item-name">${escHtml(item.name)}</span>
    <button class="del-btn">✕</button>
  `;
  row.querySelector('.checkbox').addEventListener('click', () => toggleDone(secId, item.id, !item.done));
  row.querySelector('.del-btn').addEventListener('click', () => deleteItem(secId, item.id));
  return row;
}

function renderSection(secId) {
  const items = cache[secId];
  const list  = document.getElementById(`list-${secId}`);
  if (!list) return;

  list.innerHTML = '';
  if (items.length === 0) {
    list.innerHTML = `<div class="empty">항목이 없습니다. 아래에서 추가하세요.</div>`;
  } else {
    items.forEach(item => list.appendChild(buildItemRow(secId, item)));
  }
  expandList(list);

  const badge = document.getElementById(`badge-${secId}`);
  if (badge) badge.textContent = items.length;

  const cnt = document.getElementById(`cnt-${secId}`);
  if (cnt) cnt.textContent = items.length;

  updateClearBtn();
}

function buildSectionCard(sec) {
  const card = document.createElement('div');
  card.className = `section-card ${sec.id}`;
  card.id = `card-${sec.id}`;

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <div class="section-title-row">
      <div class="section-icon">${sec.icon}</div>
      <span class="section-name">${sec.label}</span>
      <span class="section-badge" id="badge-${sec.id}">0</span>
    </div>
    <span class="chevron">▾</span>
  `;
  header.addEventListener('click', () => toggleCollapse(card));
  card.appendChild(header);

  const list = document.createElement('div');
  list.className = 'item-list';
  list.id = `list-${sec.id}`;
  list.innerHTML = `<div class="empty">로딩 중...</div>`;
  card.appendChild(list);

  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.innerHTML = `
    <input class="add-input" id="inp-${sec.id}" type="text" placeholder="항목 추가..." maxlength="40" />
    <button class="add-btn">+</button>
  `;
  addRow.querySelector('.add-btn').addEventListener('click', () => addItem(sec.id));
  addRow.querySelector('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem(sec.id);
  });
  card.appendChild(addRow);

  return card;
}

function initUI() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  SECTIONS.forEach(sec => main.appendChild(buildSectionCard(sec)));
  setDate();
}

// ── Firestore 리스닝 ────────────────────────────────────
function listenSection(secId) {
  const q = query(collection(db, secId), orderBy('createdAt'));
  onSnapshot(q, snapshot => {
    cache[secId] = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSection(secId);
  });
}

// ── Actions ────────────────────────────────────────────
async function addItem(secId) {
  const inp  = document.getElementById(`inp-${secId}`);
  const name = inp.value.trim();
  if (!name) return;
  inp.value = '';
  toast('저장 중...');
  await addDoc(collection(db, secId), { name, done: false, createdAt: Date.now() });
  toast('저장됨 ✓');
}

async function toggleDone(secId, itemId, newDone) {
  await updateDoc(doc(db, secId, itemId), { done: newDone });
}

async function deleteItem(secId, itemId) {
  const row = document.getElementById(`row-${itemId}`);
  if (row) {
    row.style.opacity = '0';
    row.style.transform = 'translateX(20px)';
    row.style.transition = 'opacity 0.2s, transform 0.2s';
  }
  setTimeout(async () => {
    await deleteDoc(doc(db, secId, itemId));
  }, 200);
}

async function clearDone() {
  const promises = [];
  SECTIONS.forEach(sec => {
    cache[sec.id].filter(i => i.done).forEach(i => {
      promises.push(deleteDoc(doc(db, sec.id, i.id)));
    });
  });
  await Promise.all(promises);
  toast('완료 항목 삭제됨 ✓');
}
window.clearDone = clearDone;

// ── Helpers ────────────────────────────────────────────
function updateClearBtn() {
  const hasDone = SECTIONS.some(sec => cache[sec.id].some(i => i.done));
  document.getElementById('clear-done-btn').classList.toggle('visible', hasDone);
}

function toggleCollapse(card) {
  const list = card.querySelector('.item-list');
  card.classList.toggle('collapsed');
  list.style.maxHeight = card.classList.contains('collapsed') ? '0' : list.scrollHeight + 400 + 'px';
}

function expandList(list) {
  list.style.maxHeight = list.scrollHeight + 400 + 'px';
}

function scrollToSection(secId) {
  document.getElementById(`card-${secId}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
window.scrollToSection = scrollToSection;

function setDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent =
    `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
}

// ── Init ───────────────────────────────────────────────
initUI();
SECTIONS.forEach(sec => listenSection(sec.id));
</script>
</body>
</html>
